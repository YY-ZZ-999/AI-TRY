<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户数据分析看板 - 40万用户数据</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }
        .stat-card .label {
            color: #666;
            margin-top: 5px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .chart-container.full-width {
            grid-column: 1 / -1;
        }
        .chart-container h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .chart {
            width: 100%;
            height: 350px;
        }
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 用户数据分析看板</h1>
            <p>基于40万用户数据的深度分析</p>
        </header>
        
        <div class="stats-cards">
            <div class="stat-card">
                <div class="number">400,000</div>
                <div class="label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="maleCount">-</div>
                <div class="label">男性用户</div>
            </div>
            <div class="stat-card">
                <div class="number" id="femaleCount">-</div>
                <div class="label">女性用户</div>
            </div>
            <div class="stat-card">
                <div class="number" id="avgDura">-</div>
                <div class="label">平均观看时长(秒)</div>
            </div>
            <div class="stat-card">
                <div class="number" id="avgCtr">-</div>
                <div class="label">平均点击率</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>👥 性别分布</h3>
                <div class="chart" id="genderChart"></div>
            </div>
            <div class="chart-container">
                <h3>📱 操作系统分布</h3>
                <div class="chart" id="osChart"></div>
            </div>
            <div class="chart-container">
                <h3>🎬 内容偏好</h3>
                <div class="chart" id="contentChart"></div>
            </div>
            <div class="chart-container">
                <h3>🏙️ 城市线分布</h3>
                <div class="chart" id="cityChart"></div>
            </div>
            <div class="chart-container full-width">
                <h3>📈 Top 10 内容垂类</h3>
                <div class="chart" id="categoryChart"></div>
            </div>
            <div class="chart-container full-width">
                <h3>🎂 年龄分布</h3>
                <div class="chart" id="ageChart"></div>
            </div>
            <div class="chart-container">
                <h3>💰 不同性别的用户活跃度</h3>
                <div class="chart" id="genderMetricsChart"></div>
            </div>
            <div class="chart-container">
                <h3>📊 内容偏好 vs 用户活跃</h3>
                <div class="chart" id="contentMetricsChart"></div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据（实际使用时从stats.json加载）
        const stats = {
            "gender": {"女": 240000, "男": 160000},
            "content_pref": {"图文": 280000, "视频": 120000},
            "os": {"安卓": 320000, "ios": 80000},
            "city_level": {"一线城市": 120000, "二线城市": 100000, "三线城市": 90000, "四线及以下": 90000},
            "category": {"影视": 80000, "音乐": 60000, "游戏": 50000, "动漫": 45000, "美食": 40000, "旅行": 35000, "运动": 30000, "科技": 25000, "情感": 20000, "其他": 15000},
            "age": {"18-22": 60000, "23-28": 100000, "29-35": 120000, "36-45": 80000, "46-55": 30000, "55以上": 10000},
            "numerical": {
                "all_dura": {"mean": 1865.32},
                "ctr_rate": {"mean": 0.15},
                "interaction_rate": {"mean": 0.05}
            },
            "gender_metrics": {
                "all_dura": {"女": 1950.5, "男": 1750.2},
                "ctr_rate": {"女": 0.16, "男": 0.13},
                "interaction_rate": {"女": 0.058, "男": 0.042}
            },
            "content_metrics": {
                "all_dura": {"图文": 1600.5, "视频": 2400.8},
                "ctr_rate": {"图文": 0.12, "视频": 0.20},
                "interaction_rate": {"图文": 0.04, "视频": 0.07}
            }
        };

        // 更新统计卡片
        document.getElementById('maleCount').textContent = (stats.gender['男'] / 10000).toFixed(1) + '万';
        document.getElementById('femaleCount').textContent = (stats.gender['女'] / 10000).toFixed(1) + '万';
        document.getElementById('avgDura').textContent = Math.round(stats.numerical.all_dura.mean);
        document.getElementById('avgCtr').textContent = (stats.numerical.ctr_rate.mean * 100).toFixed(1) + '%';

        // 性别饼图
        const genderChart = echarts.init(document.getElementById('genderChart'));
        genderChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { bottom: '0%' },
            color: ['#ff69b4', '#667eea'],
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                label: { show: true, formatter: '{b}\n{d}%' },
                data: [
                    { value: stats.gender['女'], name: '女性' },
                    { value: stats.gender['男'], name: '男性' }
                ]
            }]
        });

        // 操作系统饼图
        const osChart = echarts.init(document.getElementById('osChart'));
        osChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { bottom: '0%' },
            color: ['#4ade80', '#60a5fa'],
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                data: [
                    { value: stats.os['安卓'], name: '安卓' },
                    { value: stats.os['ios'], name: 'iOS' }
                ]
            }]
        });

        // 内容偏好饼图
        const contentChart = echarts.init(document.getElementById('contentChart'));
        contentChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { bottom: '0%' },
            color: ['#f472b6', '#fbbf24'],
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                data: [
                    { value: stats.content_pref['图文'], name: '图文' },
                    { value: stats.content_pref['视频'], name: '视频' }
                ]
            }]
        });

        // 城市线饼图
        const cityChart = echarts.init(document.getElementById('cityChart'));
        cityChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { bottom: '0%' },
            color: ['#a78bfa', '#818cf8', '#c084fc', '#e879f9'],
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                data: Object.entries(stats.city_level).map(([k, v]) => ({ name: k, value: v }))
            }]
        });

        // Top10垂类柱状图
        const categoryChart = echarts.init(document.getElementById('categoryChart'));
        categoryChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { type: 'category', data: Object.keys(stats.category).reverse() },
            series: [{
                type: 'bar',
                data: Object.values(stats.category).reverse(),
                itemStyle: { 
                    color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                        { offset: 0, color: '#667eea' },
                        { offset: 1, color: '#764ba2' }
                    ])
                },
                barWidth: '60%'
            }]
        });

        // 年龄分布柱状图
        const ageChart = echarts.init(document.getElementById('ageChart'));
        ageChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: Object.keys(stats.age) },
            yAxis: { type: 'value' },
            series: [{
                type: 'bar',
                data: Object.values(stats.age),
                itemStyle: { color: '#f472b6' },
                barWidth: '50%'
            }]
        });

        // 性别指标对比
        const genderMetricsChart = echarts.init(document.getElementById('genderMetricsChart'));
        genderMetricsChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['观看时长', '点击率', '互动率'], bottom: '0%' },
            grid: { left: '3%', right: '4%', bottom: '15%', containLabel: true },
            xAxis: { type: 'category', data: ['女性', '男性'] },
            yAxis: { type: 'value' },
            series: [
                { name: '观看时长', type: 'bar', data: [stats.gender_metrics.all_dura['女'], stats.gender_metrics.all_dura['男']], itemStyle: { color: '#667eea' } },
                { name: '点击率', type: 'bar', data: [stats.gender_metrics.ctr_rate['女']*10000, stats.gender_metrics.ctr_rate['男']*10000], itemStyle: { color: '#f472b6' } },
                { name: '互动率', type: 'bar', data: [stats.gender_metrics.interaction_rate['女']*10000, stats.gender_metrics.interaction_rate['男']*10000], itemStyle: { color: '#4ade80' } }
            ]
        });

        // 内容偏好指标
        const contentMetricsChart = echarts.init(document.getElementById('contentMetricsChart'));
        contentMetricsChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['观看时长', '点击率', '互动率'], bottom: '0%' },
            grid: { left: '3%', right: '4%', bottom: '15%', containLabel: true },
            xAxis: { type: 'category', data: ['图文', '视频'] },
            yAxis: { type: 'value' },
            series: [
                { name: '观看时长', type: 'bar', data: [stats.content_metrics.all_dura['图文'], stats.content_metrics.all_dura['视频']], itemStyle: { color: '#fbbf24' } },
                { name: '点击率', type: 'bar', data: [stats.content_metrics.ctr_rate['图文']*10000, stats.content_metrics.ctr_rate['视频']*10000], itemStyle: { color: '#60a5fa' } },
                { name: '互动率', type: 'bar', data: [stats.content_metrics.interaction_rate['图文']*10000, stats.content_metrics.interaction_rate['视频']*10000], itemStyle: { color: '#a78bfa' } }
            ]
        });

        // 响应式调整
        window.addEventListener('resize', function() {
            genderChart.resize();
            osChart.resize();
            contentChart.resize();
            cityChart.resize();
            categoryChart.resize();
            ageChart.resize();
            genderMetricsChart.resize();
            contentMetricsChart.resize();
        });
    </script>
</body>
</html>
