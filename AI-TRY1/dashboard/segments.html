<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户分群分析看板 - 优化策略</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
        }
        header h1 { font-size: 2.2rem; margin-bottom: 10px; }
        header p { opacity: 0.8; }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .summary-card:hover, .summary-card.active {
            transform: translateY(-5px);
            border-color: #ff69b4;
            background: rgba(255,255,255,0.15);
        }
        .summary-card .name { font-size: 1rem; margin-bottom: 8px; font-weight: bold; }
        .summary-card .count { font-size: 1.8rem; color: #ff69b4; font-weight: bold; }
        .summary-card .percent { font-size: 0.9rem; opacity: 0.7; }
        
        .detail-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            display: none;
        }
        .detail-panel.active { display: block; }
        
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .detail-header h2 { font-size: 1.8rem; }
        .detail-header .tag {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .tag-high { background: #ff4757; }
        .tag-medium { background: #ffa502; }
        .tag-low { background: #2ed573; }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .metric-box {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .metric-box .value { font-size: 1.6rem; color: #ff69b4; font-weight: bold; }
        .metric-box .label { font-size: 0.85rem; opacity: 0.7; margin-top: 5px; }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-card {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
        }
        .info-card h4 {
            color: #ff69b4;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-item:last-child { border: none; }
        
        .strategies-section h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #ffa502;
        }
        .strategy-card {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        .strategy-priority {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .strategy-content h4 { font-size: 1rem; margin-bottom: 8px; }
        .strategy-content p { font-size: 0.9rem; opacity: 0.7; line-height: 1.5; }
        
        .chart-section {
            margin-top: 30px;
        }
        .chart-section h3 { margin-bottom: 15px; }
        .chart-box {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            height: 300px;
        }
        
        @media (max-width: 900px) {
            .summary-cards { grid-template-columns: repeat(2, 1fr); }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 用户分群分析与优化策略</h1>
            <p>基于40万用户数据的智能分群 - 点击人群查看详细策略</p>
        </header>
        
        <div class="summary-cards" id="summaryCards"></div>
        
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <h2 id="segmentName">人群名称</h2>
                <span class="tag tag-high" id="segmentTag">高价值</span>
            </div>
            
            <div class="metrics-grid" id="metricsGrid"></div>
            
            <div class="info-grid" id="infoGrid"></div>
            
            <div class="strategies-section">
                <h3>💡 优化策略建议</h3>
                <div id="strategiesList"></div>
            </div>
            
            <div class="chart-section">
                <h3>📊 人群占比分布</h3>
                <div class="chart-box" id="pieChart"></div>
            </div>
        </div>
    </div>

    <script>
        // 用户分群数据
        const segmentData = {
            "高价值活跃用户": {
                name: "高价值活跃用户",
                count: 142789,
                percentage: 35.7,
                main_gender: "男",
                gender_ratio: { "男": 60.7, "女": 39.3 },
                main_content: "视频",
                content_ratio: { "视频": 52.8, "图文": 47.2 },
                main_categories: ["军事国际", "大健康", "影视综"],
                main_age: "50-52",
                main_os: "安卓",
                main_city: "二线城市",
                main_consume: "中",
                avg_dura: 2630.2,
                avg_ctr: 37.77,
                avg_interaction: 16.0,
                strategies: [
                    { title: "VIP专属权益", content: "提供会员专属福利、优先体验新功能、专属客服通道", priority: "高" },
                    { title: "社区荣誉体系", content: "建立用户成长体系，赋予特殊标识，增强归属感", priority: "高" },
                    { title: "内容共创邀请", content: "邀请参与内容创作、优先体验付费内容", priority: "中" }
                ]
            },
            "潜力用户": {
                name: "潜力用户",
                count: 46248,
                percentage: 11.6,
                main_gender: "男",
                gender_ratio: { "男": 51.5, "女": 48.5 },
                main_content: "视频",
                content_ratio: { "视频": 63.2, "图文": 36.8 },
                main_categories: ["大健康", "影视综", "军事国际"],
                main_age: "50-52",
                main_os: "安卓",
                main_city: "二线城市",
                main_consume: "中",
                avg_dura: 2012.5,
                avg_ctr: 35.19,
                avg_interaction: 7.25,
                strategies: [
                    { title: "个性化推荐优化", content: "根据其内容偏好，提升推荐算法精准度", priority: "高" },
                    { title: "互动激励计划", content: "增加互动道具、点赞评论奖励机制", priority: "高" },
                    { title: "新手引导优化", content: "完善功能引导，降低使用门槛", priority: "中" }
                ]
            },
            "视频爱好者": {
                name: "视频爱好者",
                count: 45496,
                percentage: 11.4,
                main_gender: "男",
                gender_ratio: { "男": 54.1, "女": 45.9 },
                main_content: "视频",
                content_ratio: { "视频": 100, "图文": 0 },
                main_categories: ["影视综", "音乐", "游戏"],
                main_age: "50-52",
                main_os: "安卓",
                main_city: "二线城市",
                main_consume: "中",
                avg_dura: 2850.3,
                avg_ctr: 28.5,
                avg_interaction: 3.2,
                strategies: [
                    { title: "视频内容池扩充", content: "增加优质视频内容供给，尤其是其偏好的垂类", priority: "高" },
                    { title: "短视频推送优化", content: "优化短视频feed流推送策略", priority: "中" },
                    { title: "流量包优惠", content: "针对视频用户推出专属流量包", priority: "低" }
                ]
            },
            "普通用户": {
                name: "普通用户",
                count: 157299,
                percentage: 39.3,
                main_gender: "女",
                gender_ratio: { "女": 55.2, "男": 44.8 },
                main_content: "图文",
                content_ratio: { "图文": 60.5, "视频": 39.5 },
                main_categories: ["影视综", "美食", "音乐"],
                main_age: "50-52",
                main_os: "安卓",
                main_city: "四线及以下",
                main_consume: "低",
                avg_dura: 1280.5,
                avg_ctr: 8.5,
                avg_interaction: 1.8,
                strategies: [
                    { title: "日常活跃激励", content: "签到奖励、每日任务体系", priority: "中" },
                    { title: "内容多样性引导", content: "推荐更多垂类内容，拓展兴趣边界", priority: "中" },
                    { title: "社交功能曝光", content: "强化评论、分享等社交功能", priority: "低" }
                ]
            },
            "沉默用户": {
                name: "沉默用户",
                count: 8168,
                percentage: 2.0,
                main_gender: "男",
                gender_ratio: { "男": 58.3, "女": 41.7 },
                main_content: "图文",
                content_ratio: { "图文": 55.2, "视频": 44.8 },
                main_categories: ["影视综", "游戏", "音乐"],
                main_age: "50-52",
                main_os: "ios",
                main_city: "一线城市",
                main_consume: "高",
                avg_dura: 520.3,
                avg_ctr: 5.2,
                avg_interaction: 0.5,
                strategies: [
                    { title: "流失预警机制", content: "建立7天未活跃用户预警，主动触达", priority: "高" },
                    { title: "召回Push策略", content: "推送个性化内容、限时福利召回", priority: "高" },
                    { title: "简化操作流程", content: "优化APP性能，减少卡顿，提升启动速度", priority: "中" }
                ]
            }
        };

        // 渲染顶部卡片
        function renderCards() {
            const container = document.getElementById('summaryCards');
            const segments = Object.values(segmentData);
            
            container.innerHTML = segments.map(seg => `
                <div class="summary-card" onclick="showDetail('${seg.name}')">
                    <div class="name">${seg.name}</div>
                    <div class="count">${(seg.count/10000).toFixed(1)}万</div>
                    <div class="percent">占比 ${seg.percentage}%</div>
                </div>
            `).join('');
            
            // 默认显示第一个
            showDetail(segments[0].name);
        }

        // 显示详情
        function showDetail(segmentName) {
            const seg = segmentData[segmentName];
            if (!seg) return;
            
            // 高亮选中卡片
            document.querySelectorAll('.summary-card').forEach(card => {
                card.classList.toggle('active', card.querySelector('.name').textContent === segmentName);
            });
            
            // 显示详情面板
            document.getElementById('detailPanel').classList.add('active');
            document.getElementById('segmentName').textContent = seg.name;
            
            // 标签
            const tagEl = document.getElementById('segmentTag');
            if (seg.percentage >= 30) {
                tagEl.className = 'tag tag-high';
                tagEl.textContent = '核心人群';
            } else if (seg.percentage >= 10) {
                tagEl.className = 'tag tag-medium';
                tagEl.textContent = '重要人群';
            } else {
                tagEl.className = 'tag tag-low';
                tagEl.textContent = '待激活';
            }
            
            // 指标
            document.getElementById('metricsGrid').innerHTML = `
                <div class="metric-box">
                    <div class="value">${seg.avg_dura.toFixed(0)}</div>
                    <div class="label">平均观看时长(秒)</div>
                </div>
                <div class="metric-box">
                    <div class="value">${seg.avg_ctr.toFixed(1)}%</div>
                    <div class="label">平均点击率</div>
                </div>
                <div class="metric-box">
                    <div class="value">${seg.avg_interaction.toFixed(2)}%</div>
                    <div class="label">平均互动率</div>
                </div>
                <div class="metric-box">
                    <div class="value">${seg.main_gender}</div>
                    <div class="label">主要性别</div>
                </div>
            `;
            
            // 基本信息
            document.getElementById('infoGrid').innerHTML = `
                <div class="info-card">
                    <h4>👤 用户特征</h4>
                    <div class="info-item"><span>内容偏好</span><span>${seg.main_content}</span></div>
                    <div class="info-item"><span>年龄段</span><span>${seg.main_age}</span></div>
                    <div class="info-item"><span>操作系统</span><span>${seg.main_os}</span></div>
                    <div class="info-item"><span>城市线</span><span>${seg.main_city}</span></div>
                    <div class="info-item"><span>消费水平</span><span>${seg.main_consume}</span></div>
                </div>
                <div class="info-card">
                    <h4>📂 偏好垂类</h4>
                    ${seg.main_categories.map((cat, i) => `
                        <div class="info-item"><span>Top ${i+1}</span><span>${cat}</span></div>
                    `).join('')}
                </div>
            `;
            
            // 策略
            document.getElementById('strategiesList').innerHTML = seg.strategies.map(s => `
                <div class="strategy-card">
                    <span class="strategy-priority ${s.priority === '高' ? 'tag-high' : s.priority === '中' ? 'tag-medium' : 'tag-low'}">${s.priority}优先</span>
                    <div class="strategy-content">
                        <h4>${s.title}</h4>
                        <p>${s.content}</p>
                    </div>
                </div>
            `).join('');
            
            // 饼图
            renderPieChart(segmentName);
        }

        // 饼图
        let pieChart = null;
        function renderPieChart(currentSeg) {
            const chartDom = document.getElementById('pieChart');
            if (pieChart) pieChart.dispose();
            pieChart = echarts.init(chartDom);
            
            const data = Object.values(segmentData).map(s => ({
                name: s.name,
                value: s.count
            }));
            
            pieChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c}人 ({d}%)' },
                legend: { bottom: '0%', textStyle: { color: '#fff' } },
                color: ['#ff69b4', '#667eea', '#4ade80', '#ffa502', '#f472b6'],
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '45%'],
                    data: data,
                    label: { show: true, formatter: '{b}\n{d}%' }
                }]
            });
        }

        // 初始化
        renderCards();
        
        window.addEventListener('resize', () => {
            if (pieChart) pieChart.resize();
        });
    </script>
</body>
</html>
